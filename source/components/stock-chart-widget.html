<!-- 
========================================
实时股票价格预测组件 - 嵌入版
技术栈：React 18 + Recharts + WebSocket
用途：嵌入博客主页展示实时金融数据
========================================
-->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>实时股票价格预测组件</title>
    <script src="https://unpkg.com/prop-types/prop-types.min.js"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Recharts - 使用双 CDN 备份 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/recharts/2.15.0/Recharts.min.js"></script>
    <script>
        // 如果 cdnjs 加载失败，尝试 unpkg 作为备用
        if (typeof Recharts === 'undefined') {
            console.warn('⚠️ cdnjs Recharts 加载失败，尝试备用 CDN...');
            const script = document.createElement('script');
            script.src = 'https://unpkg.com/recharts/umd/Recharts.min.js';
            document.head.appendChild(script);
        }
    </script>
    <!-- 金融数据服务 -->
    <script src="/js/financial-data-service.js"></script>
    <!-- Finnhub WebSocket 服务 -->
    <script src="/js/finnhub-service.js"></script>
    
    <!-- 自动配置 Finnhub API Key -->
    <script>
        // 如果 localStorage 中没有 API Key，则自动设置
        if (!localStorage.getItem('finnhub_api_key')) {
            localStorage.setItem('finnhub_api_key', 'd6rihfpr01qr194ms4ngd6rihfpr01qr194ms4o0');
            console.log('✅ Finnhub API Key 已自动配置');
            console.log('💡 提示：刷新页面即可启用真实美股行情数据');
        }
    </script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: transparent;
        }

        .container {
            width: 100%;
            min-height: 400px;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 16px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding: 15px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 12px;
            backdrop-filter: blur(10px);
        }

        .title {
            font-size: 20px;
            font-weight: 700;
            color: #2d3748;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .chart-container {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-top: 20px;
            padding: 15px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 12px;
            backdrop-filter: blur(10px);
        }

        .info-item {
            text-align: center;
        }

        .info-label {
            font-size: 13px;
            color: #718096;
            margin-bottom: 8px;
        }

        .info-value {
            font-size: 24px;
            font-weight: 700;
            color: #3182ce;
        }

        .controls {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
            transition: all 0.2s;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover {
            background: #5568d3;
        }

        .btn-success {
            background: #48bb78;
            color: white;
        }

        .btn-success:hover {
            background: #38a169;
        }

        .btn-danger {
            background: #f56565;
            color: white;
        }

        .btn-danger:hover {
            background: #e53e3e;
        }

        @media (max-width: 768px) {
            .container {
                padding: 15px;
            }

            .header {
                flex-direction: column;
                gap: 10px;
            }

            .info-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // 安全检查：确保 Recharts 已加载
        if (typeof Recharts === 'undefined') {
            console.error('❌ Recharts 未加载！请检查网络或 CDN');
        }
        
        const { useState, useEffect, useRef, useCallback } = React;
        const { LineChart, Line, XAxis, YAxis, Tooltip, CartesianGrid, ResponsiveContainer } = Recharts || {};

        // ====== 防抖工具函数 ======
        function debounce(fn, delay) {
            let timer = null;
            return function (...args) {
                clearTimeout(timer);
                timer = setTimeout(() => fn.apply(this, args), delay);
            };
        }

        // ====== 主组件 ======
        const RealTimeStockChart = () => {
            const [data, setData] = useState([]);
            const [latestPrediction, setLatestPrediction] = useState(null);
            const [connectionStatus, setConnectionStatus] = useState('connecting');
            const [dataSource, setDataSource] = useState('mock'); // 'mock' | 'finnhub'
            const [selectedSymbol, setSelectedSymbol] = useState('AAPL'); // 默认股票
            const ws = useRef(null);
            const reconnectTimeout = useRef(null);
            const removeListenerRef = useRef(null); // 存储监听器移除函数
            const MAX_DATA_POINTS = 30;
            
            // 支持的股票代码列表
            const symbolList = [
                // === 美股科技巨头 ===
                { code: 'AAPL', name: '苹果 Apple', type: 'stock' },
                { code: 'MSFT', name: '微软 Microsoft', type: 'stock' },
                { code: 'GOOGL', name: '谷歌 Google', type: 'stock' },
                { code: 'AMZN', name: '亚马逊 Amazon', type: 'stock' },
                { code: 'TSLA', name: '特斯拉 Tesla', type: 'stock' },
                { code: 'META', name: 'Meta (Facebook)', type: 'stock' },
                { code: 'NVDA', name: '英伟达 NVIDIA', type: 'stock' },
                { code: 'NFLX', name: '奈飞 Netflix', type: 'stock' },
                
                // === 全球主要股指 ===
                { code: 'SPY', name: '标普 500 指数 ETF', type: 'index' },
                { code: 'DIA', name: '道琼斯指数 ETF', type: 'index' },
                { code: 'QQQ', name: '纳斯达克 100ETF', type: 'index' },
                { code: 'IWM', name: '罗素 2000ETF', type: 'index' },
                { code: 'VIX', name: '恐慌指数 VIX', type: 'index' },
                { code: '^GSPC', name: '标普 500', type: 'index' },
                { code: '^DJI', name: '道琼斯工业平均', type: 'index' },
                { code: '^IXIC', name: '纳斯达克综合', type: 'index' },
                { code: '^N225', name: '日经 225', type: 'index' },
                { code: '^HSI', name: '恒生指数', type: 'index' },
                { code: '000001.SS', name: '上证指数', type: 'index' },
                { code: '399001.SZ', name: '深证成指', type: 'index' },
                
                // === 热门 ETF ===
                { code: 'VTI', name: '全美市场 ETF', type: 'etf' },
                { code: 'VOO', name: '标普 500 ETF(Vanguard)', type: 'etf' },
                { code: 'ARKK', name: 'ARK 创新 ETF', type: 'etf' },
                { code: 'GDXJ', name: '小盘金矿 ETF', type: 'etf' },
                { code: 'USO', name: '原油 ETF', type: 'etf' },
                { code: 'GLD', name: '黄金 ETF', type: 'etf' },
                { code: 'SLV', name: '白银 ETF', type: 'etf' },
                { code: 'TLT', name: '20 年 + 国债 ETF', type: 'etf' },
                { code: 'XLF', name: '金融板块 ETF', type: 'etf' },
                { code: 'XLE', name: '能源板块 ETF', type: 'etf' },
                { code: 'XLK', name: '科技板块 ETF', type: 'etf' },
                
                // === 中概股 ===
                { code: 'BABA', name: '阿里巴巴', type: 'stock' },
                { code: 'JD', name: '京东', type: 'stock' },
                { code: 'PDD', name: '拼多多', type: 'stock' },
                { code: 'NIO', name: '蔚来汽车', type: 'stock' },
                { code: 'XPEV', name: '小鹏汽车', type: 'stock' },
                { code: 'LI', name: '理想汽车', type: 'stock' }
            ];

            // ====== 数据源切换 ======
            const toggleDataSource = useCallback(() => {
                const sources = ['mock', 'finnhub'];
                const currentIndex = sources.indexOf(dataSource);
                const nextSource = sources[(currentIndex + 1) % sources.length];
                
                setDataSource(nextSource);
                console.log(`🔄 切换到 ${nextSource === 'mock' ? '模拟' : 'Finnhub'} 数据源`);
                
                // 重置连接状态
                setConnectionStatus('connecting');
                setData([]);
                
                // 清理之前的连接
                if (removeListenerRef.current) {
                    removeListenerRef.current();
                }
                
                if (nextSource === 'mock') {
                    startMockData();
                } else if (nextSource === 'finnhub') {
                    connectFinnhub();
                }
            }, [dataSource]);
            
            // ====== 股票切换 ======
            const changeSymbol = useCallback((newSymbol) => {
                setSelectedSymbol(newSymbol);
                console.log(`📊 切换到股票：${newSymbol}`);
                
                // 如果当前是 Finnhub 模式，重新订阅
                if (dataSource === 'finnhub' && ws.current?.isConnected) {
                    try {
                        // 取消旧订阅
                        if (ws.current.unsubscribe) {
                            ws.current.unsubscribe(selectedSymbol);
                        }
                        // 订阅新股票
                        setTimeout(() => {
                            ws.current.subscribe(newSymbol);
                            console.log(`📡 已订阅 ${newSymbol}`);
                        }, 300);
                    } catch (error) {
                        console.error('❌ 切换股票失败:', error);
                    }
                }
                
                // 清空图表数据
                setData([]);
            }, [dataSource, selectedSymbol]);

            // ====== WebSocket 连接管理 ======
            const connectWebSocket = useCallback(() => {
                if (ws.current?.readyState === WebSocket.OPEN) {
                    return;
                }

                setConnectionStatus('connecting');
                
                try {
                    // 模拟 WebSocket（实际使用可替换为真实地址）
                    ws.current = {
                        readyState: WebSocket.OPEN,
                        close: () => { ws.current.readyState = WebSocket.CLOSED; }
                    };

                    console.log('✅ WebSocket 已连接（模拟模式）');
                    setConnectionStatus('connected');
                    
                    // 启动模拟数据流
                    startMockData();
                } catch (error) {
                    console.error('❌ WebSocket 连接失败:', error);
                    setConnectionStatus('error');
                }
            }, []);

            // ====== Finnhub WebSocket 连接 ======
            const connectFinnhub = useCallback(() => {
                setConnectionStatus('connecting');
                
                try {
                    // 检查是否配置了 Finnhub API Key
                    const apiKey = window.FINNHUB_API_KEY || localStorage.getItem('finnhub_api_key');
                    
                    if (!apiKey) {
                        console.warn('⚠️ 未配置 Finnhub API Key，自动降级到模拟模式');
                        console.log('💡 提示：在浏览器控制台执行：localStorage.setItem("finnhub_api_key", "your-api-key")');
                        setDataSource('mock');
                        startMockData();
                        return;
                    }
                    
                    // 创建或获取 Finnhub 服务实例
                    if (!window.finnhubService) {
                        window.finnhubService = new FinnhubService(apiKey);
                    }
                    
                    ws.current = window.finnhubService;
                    
                    // 添加数据监听器
                    const removeListener = window.finnhubService.addListener((tickData) => {
                        if (tickData.type === 'connected') {
                            setConnectionStatus('connected');
                            console.log('✅ Finnhub 已连接');
                            
                            // 等待一小段时间确保 WebSocket 完全建立后再订阅
                            setTimeout(() => {
                                try {
                                    const defaultSymbol = selectedSymbol || 'AAPL';
                                    if (window.finnhubService && window.finnhubService.isConnected) {
                                        window.finnhubService.subscribe(defaultSymbol);
                                        console.log(`📡 已订阅 ${defaultSymbol}`);
                                    } else {
                                        console.warn('⚠️ WebSocket 未完全连接，延迟订阅...');
                                    }
                                } catch (error) {
                                    console.error('❌ 订阅失败:', error.message);
                                }
                            }, 500); // 延迟 500ms 订阅
                            
                        } else if (tickData.type === 'error') {
                            setConnectionStatus('error');
                            console.error('❌ Finnhub 错误:', tickData.error);
                            
                            // 立即降级到模拟模式（不再等待）
                            console.warn('⚠️ Finnhub 连接失败，1 秒后切换到模拟数据模式...');
                            setTimeout(() => {
                                if (dataSource === 'finnhub') {
                                    console.log('📉 已降级到模拟数据模式');
                                    setDataSource('mock');
                                    startMockData();
                                }
                            }, 1000);
                            
                        } else if (tickData.type === 'disconnected') {
                            setConnectionStatus('disconnected');
                            console.warn('⚠️ Finnhub 断开连接');
                            
                            // 尝试重连
                            setTimeout(() => {
                                if (dataSource === 'finnhub' && !ws.current?.isConnected) {
                                    console.log('🔄 尝试重新连接 Finnhub...');
                                    ws.current.connect();
                                }
                            }, 3000);
                            
                        } else if (tickData && tickData.price) {
                            // 收到实时交易数据
                            handleRealtimeData(tickData);
                        }
                    });
                    
                    // 连接 WebSocket
                    window.finnhubService.connect();
                    
                    // 存储移除函数，用于清理
                    removeListenerRef.current = removeListener;
                    return removeListener;
                    
                } catch (error) {
                    console.error('❌ Finnhub 连接失败:', error.message);
                    setConnectionStatus('error');
                    
                    // 静默降级到模拟模式
                    console.warn('⚠️ Finnhub 连接失败，降级到模拟数据模式');
                    setTimeout(() => {
                        setDataSource('mock');
                        startMockData();
                    }, 1000);
                }
            }, [dataSource, selectedSymbol]);

            // ====== 处理实时数据 ======
            const handleRealtimeData = useCallback((tickData) => {
                if (!tickData || !tickData.price) return;
                
                const prediction = {
                    predictedPrice: tickData.price,
                    predictedTrendProbability: tickData.changePercent > 0 ? 0.7 : 0.3,
                    timestamp: new Date(tickData.timestamp).toISOString()
                };
                
                setLatestPrediction(prediction);
                setData((prevData) => {
                    const newEntry = {
                        time: new Date(prediction.timestamp).toLocaleTimeString('zh-CN', {
                            hour: '2-digit',
                            minute: '2-digit',
                            second: '2-digit',
                        }),
                        price: Number(prediction.predictedPrice),
                    };
                    const updatedData = [...prevData, newEntry].slice(-MAX_DATA_POINTS);
                    return updatedData;
                });
            }, []);

            // ====== 初始化和清理 ======
            useEffect(() => {
                if (dataSource === 'finnhub') {
                    connectFinnhub();
                } else {
                    connectWebSocket();
                }

                return () => {
                    // 清理定时器
                    if (reconnectTimeout.current) {
                        clearTimeout(reconnectTimeout.current);
                    }
                    
                    // 清理监听器
                    if (removeListenerRef.current) {
                        removeListenerRef.current();
                        removeListenerRef.current = null;
                    }
                    
                    // 断开 WebSocket 连接
                    if (ws.current) {
                        if (dataSource === 'finnhub') {
                            // Finnhub 服务不断开连接，只取消订阅
                            const symbolToUnsubscribe = selectedSymbol || 'AAPL';
                            try {
                                ws.current.unsubscribe(symbolToUnsubscribe);
                                console.log(`📡 已取消订阅 ${symbolToUnsubscribe}`);
                            } catch (error) {
                                console.warn('⚠️ 取消订阅失败:', error.message);
                            }
                        } else {
                            // 模拟 WebSocket 或原生 WebSocket
                            try {
                                if (typeof ws.current.close === 'function') {
                                    ws.current.close();
                                }
                            } catch (error) {
                                console.warn('⚠️ 关闭 WebSocket 失败:', error.message);
                            }
                        }
                    }
                };
            }, [dataSource, connectWebSocket, connectFinnhub]);

            // ====== 模拟数据生成 ======
            const startMockData = useCallback(() => {
                let basePrice = 100 + Math.random() * 50;
                const interval = setInterval(() => {
                    basePrice = basePrice + (Math.random() - 0.5) * 5;
                    sendPrediction(basePrice);
                }, 2000);
                
                window.mockInterval = interval;
            }, []);

            // ====== 发送预测数据 ======
            const sendPrediction = useCallback((price) => {
                const currentPrice = price || (100 + Math.random() * 50);
                const prediction = {
                    predictedPrice: currentPrice,
                    predictedTrendProbability: Math.random(),
                    timestamp: new Date().toISOString()
                };
                
                setLatestPrediction(prediction);
                setData((prevData) => {
                    const newEntry = {
                        time: new Date(prediction.timestamp).toLocaleTimeString('zh-CN', {
                            hour: '2-digit',
                            minute: '2-digit',
                            second: '2-digit',
                        }),
                        price: Number(prediction.predictedPrice),
                    };
                    const updatedData = [...prevData, newEntry].slice(-MAX_DATA_POINTS);
                    return updatedData;
                });
            }, []);

            // ====== 状态显示 ======
            const getStatusColor = () => {
                switch (connectionStatus) {
                    case 'connected': return '#52c41a';
                    case 'connecting': return '#faad14';
                    case 'disconnected': return '#d9d9d9';
                    case 'error': return '#ff4d4f';
                    default: return '#d9d9d9';
                }
            };

            const getStatusText = () => {
                switch (connectionStatus) {
                    case 'connected': return '已连接';
                    case 'connecting': return '连接中...';
                    case 'disconnected': return '已断开';
                    case 'error': return '连接错误';
                    default: return '未知状态';
                }
            };

            // ====== 价格格式化 ======
            const formatPrice = (price) => {
                return new Intl.NumberFormat('zh-CN', {
                    style: 'currency',
                    currency: 'CNY',
                    minimumFractionDigits: 2,
                }).format(price);
            };

            // ====== 自定义 Tooltip ======
            const CustomTooltip = ({ active, payload, label }) => {
                if (active && payload && payload.length) {
                    return (
                        <div style={{
                            background: 'white',
                            padding: '12px',
                            border: '1px solid #e2e8f0',
                            borderRadius: '6px',
                            boxShadow: '0 4px 6px rgba(0,0,0,0.1)'
                        }}>
                            <p style={{ margin: '0 0 8px 0', fontWeight: 600 }}>{label}</p>
                            <p style={{ margin: 0, color: '#3182ce' }}>
                                价格：{formatPrice(payload[0].value)}
                            </p>
                        </div>
                    );
                }
                return null;
            };

            // ====== 渲染 UI ======
            return (
                <div className="container">
                    {/* 头部 */}
                    <div className="header">
                        <h2 className="title">📊 实时股票价格预测</h2>
                        <div style={{ display: 'flex', alignItems: 'center', gap: '12px', flexWrap: 'wrap' }}>
                            {/* 股票选择器 */}
                            <select 
                                value={selectedSymbol}
                                onChange={(e) => changeSymbol(e.target.value)}
                                style={{
                                    padding: '8px 12px',
                                    borderRadius: '6px',
                                    border: '2px solid #667eea',
                                    background: 'white',
                                    color: '#333',
                                    fontSize: '14px',
                                    fontWeight: 600,
                                    cursor: 'pointer',
                                    outline: 'none'
                                }}
                            >
                                <optgroup label="🇺🇸 美股科技巨头">
                                    {symbolList.filter(s => s.type === 'stock' && !s.code.includes('.')).slice(0, 8).map(s => (
                                        <option key={s.code} value={s.code}>{s.name} ({s.code})</option>
                                    ))}
                                </optgroup>
                                <optgroup label="🌏 全球主要股指">
                                    {symbolList.filter(s => s.type === 'index').map(s => (
                                        <option key={s.code} value={s.code}>{s.name} ({s.code})</option>
                                    ))}
                                </optgroup>
                                <optgroup label="💰 热门 ETF">
                                    {symbolList.filter(s => s.type === 'etf').map(s => (
                                        <option key={s.code} value={s.code}>{s.name} ({s.code})</option>
                                    ))}
                                </optgroup>
                                <optgroup label="🇨🇳 中概股">
                                    {symbolList.filter(s => s.type === 'stock' && (s.code === 'BABA' || s.code === 'JD' || s.code === 'PDD' || s.code.includes('NIO') || s.code.includes('XPEV') || s.code === 'LI')).map(s => (
                                        <option key={s.code} value={s.code}>{s.name} ({s.code})</option>
                                    ))}
                                </optgroup>
                            </select>
                            
                            {/* 数据源指示器 */}
                            <span style={{ 
                                fontSize: '12px', 
                                color: dataSource === 'mock' ? '#52c41a' : dataSource === 'itick' ? '#1890ff' : '#fa8c16',
                                padding: '4px 8px',
                                background: dataSource === 'mock' ? 'rgba(82,196,26,0.1)' : dataSource === 'itick' ? 'rgba(24,144,255,0.1)' : 'rgba(250,140,22,0.1)',
                                borderRadius: '4px',
                                fontWeight: 600
                            }}>
                                {dataSource === 'mock' ? '🔧 模拟数据' : dataSource === 'itick' ? '⚡ iTick' : '🇺🇸 Finnhub'}
                            </span>
                            
                            {/* 连接状态 */}
                            <div style={{ display: 'flex', alignItems: 'center', gap: '8px' }}>
                                <span
                                    style={{
                                        width: '12px',
                                        height: '12px',
                                        borderRadius: '50%',
                                        backgroundColor: getStatusColor()
                                    }}
                                />
                                <span style={{ fontSize: '14px', color: '#718096' }}>
                                    {getStatusText()}
                                </span>
                            </div>
                        </div>
                    </div>

                    {/* 图表区域 */}
                    <div className="chart-container">
                        {data.length > 0 ? (
                            <ResponsiveContainer width="100%" height={300}>
                                <LineChart 
                                    data={data} 
                                    margin={{ top: 20, right: 30, left: 20, bottom: 5 }}
                                >
                                    <CartesianGrid strokeDasharray="3 3" stroke="#e0e0e0" />
                                    <XAxis 
                                        dataKey="time" 
                                        minTickGap={20}
                                        tick={{ fontSize: 12 }}
                                    />
                                    <YAxis 
                                        domain={['auto', 'auto']}
                                        tickFormatter={(value) => `¥${value}`}
                                        tick={{ fontSize: 12 }}
                                    />
                                    <Tooltip content={<CustomTooltip />} />
                                    <Line 
                                        type="monotone" 
                                        dataKey="price" 
                                        stroke="#8884d8" 
                                        strokeWidth={2} 
                                        dot={false}
                                        activeDot={{ r: 6, fill: '#8884d8' }}
                                    />
                                </LineChart>
                            </ResponsiveContainer>
                        ) : (
                            <div style={{
                                height: '300px',
                                display: 'flex',
                                alignItems: 'center',
                                justifyContent: 'center',
                                background: '#f7fafc',
                                borderRadius: '6px'
                            }}>
                                <p style={{ color: '#a0aec0' }}>等待实时数据...</p>
                            </div>
                        )}
                    </div>

                    {/* 信息展示区 */}
                    {latestPrediction && (
                        <div className="info-grid">
                            <div className="info-item">
                                <p className="info-label">最新预测价格</p>
                                <p className="info-value">{formatPrice(latestPrediction.predictedPrice)}</p>
                            </div>
                            <div className="info-item">
                                <p className="info-label">涨价概率</p>
                                <p className="info-value" style={{ 
                                    color: latestPrediction.predictedTrendProbability >= 0.5 ? '#38a169' : '#e53e3e' 
                                }}>
                                    {(latestPrediction.predictedTrendProbability * 100).toFixed(1)}%
                                </p>
                            </div>
                        </div>
                    )}

                    {/* 控制按钮 */}
                    <div className="controls">
                        <button className="btn btn-primary" onClick={toggleDataSource}>
                            🔄 切换{dataSource === 'mock' ? 'iTick' : dataSource === 'itick' ? 'Finnhub' : '模拟'}数据
                        </button>
                        {dataSource === 'mock' && (
                            <>
                                <button className="btn btn-success" onClick={() => sendPrediction()}>
                                    📈 手动预测
                                </button>
                                <button className="btn btn-danger" onClick={() => {
                                    if (ws.current) {
                                        ws.current.close();
                                        setConnectionStatus('disconnected');
                                    }
                                }}>
                                    🔌 断开连接
                                </button>
                            </>
                        )}
                        {(dataSource === 'itick' || dataSource === 'finnhub') && (
                            <button className="btn btn-danger" onClick={() => {
                                if (ws.current) {
                                    ws.current.disconnect();
                                    setConnectionStatus('disconnected');
                                }
                            }}>
                                🔌 断开{dataSource === 'itick' ? 'iTick' : 'Finnhub'}
                            </button>
                        )}
                    </div>
                </div>
            );
        };

        // ====== 渲染组件 ======
        ReactDOM.createRoot(document.getElementById('root')).render(
            <RealTimeStockChart />
        );
    </script>
</body>
</html>
