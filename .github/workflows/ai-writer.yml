name: AI Auto Writer

on:
  # 每天早上 8 点执行（北京时间）
  schedule:
    - cron: '0 0 * * *'  # UTC 0:00 = 北京 8:00
  
  # 手动触发
  workflow_dispatch:
    inputs:
      count:
        description: '生成文章数量'
        required: false
        default: '1'
      template:
        description: '文章模板 (base/quick/deep)'
        required: false
        default: 'base'
      category:
        description: '指定分类（可选）'
        required: false
        default: ''

# 防止重复执行
concurrency:
  group: ai-writer
  cancel-in-progress: true

jobs:
  generate-article:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install openai python-dotenv
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      
      - name: Install Hexo Dependencies
        run: |
          npm install -g hexo-cli
          npm install
          mkdir -p themes
          [ -L themes/next ] || ln -sf ../node_modules/hexo-theme-next themes/next
      
      - name: Generate Article
        env:
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          AI_BASE_URL: ${{ secrets.AI_BASE_URL }}
        run: |
          # 获取输入参数
          COUNT="${{ github.event.inputs.count }}"
          TEMPLATE="${{ github.event.inputs.template }}"
          CATEGORY="${{ github.event.inputs.category }}"
          
          # 如果是定时触发，默认生成 1 篇
          if [ -z "$COUNT" ]; then
            COUNT=1
          fi
          
          # 构建命令
          CMD="python scripts/ai_writer.py --count $COUNT"
          
          if [ -n "$TEMPLATE" ]; then
            CMD="$CMD --template $TEMPLATE"
          fi
          
          if [ -n "$CATEGORY" ]; then
            CMD="$CMD --category $CATEGORY"
          fi
          
          echo "运行命令：$CMD"
          eval $CMD
      
      - name: Check Generated Files
        id: check_files
        run: |
          # 查找新生成的文件（今天创建的）
          TODAY=$(date +%Y-%m-%d)
          NEW_FILES=$(find source/_posts -name "$TODAY-*.md" -type f 2>/dev/null || echo "")
          
          if [ -n "$NEW_FILES" ]; then
            echo "找到新生成的文件:"
            echo "$NEW_FILES"
            
            # 统计数量
            FILE_COUNT=$(echo "$NEW_FILES" | wc -l)
            echo "file_count=$FILE_COUNT" >> $GITHUB_OUTPUT
            
            # 提取文件名列表
            echo "$NEW_FILES" > new_articles.txt
          else
            echo "⚠️ 未找到新生成的文件"
            echo "file_count=0" >> $GITHUB_OUTPUT
          fi
      
      - name: Commit and Push
        if: steps.check_files.outputs.file_count > 0
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # 添加新文件
          git add source/_posts/*.md
          
          # 检查是否有变更
          if ! git diff --staged --quiet; then
            # 有变更则提交
            git commit -m "🤖 AI 自动生成文章 $(date +%Y-%m-%d) [skip ci]"
            git push origin master
            echo "✅ 已推送 ${FILE_COUNT:-0} 篇文章"
          else
            echo "ℹ️ 没有变更需要提交"
          fi
      
      - name: Build and Deploy
        if: steps.check_files.outputs.file_count > 0
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 等待片刻确保 git push 完成
          sleep 5
          
          # 重新拉取最新代码
          git pull origin master
          
          # 构建和部署
          hexo clean
          hexo generate
          hexo deploy
      
      - name: Upload Articles List
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: generated-articles
          path: |
            new_articles.txt
          retention-days: 30
      
      - name: Summary
        run: |
          echo "## 🤖 AI 自动创作完成" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📊 生成统计" >> $GITHUB_STEP_SUMMARY
          echo "- 生成数量：${{ steps.check_files.outputs.file_count }} 篇" >> $GITHUB_STEP_SUMMARY
          echo "- 触发方式：${{ github.event_name == 'schedule' && '⏰ 定时任务' || '👆 手动触发' }}" >> $GITHUB_STEP_SUMMARY
          echo "- 执行时间：$(TZ=Asia/Shanghai date +'%Y-%m-%d %H:%M:%S') BJT" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📝 新增文章" >> $GITHUB_STEP_SUMMARY
          
          if [ -f new_articles.txt ] && [ -s new_articles.txt ]; then
            while IFS= read -r file; do
              filename=$(basename "$file")
              echo "- 📄 \`$filename\`" >> $GITHUB_STEP_SUMMARY
            done < new_articles.txt
          else
            echo "_暂无新文章_" >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🔗 相关链接" >> $GITHUB_STEP_SUMMARY
          echo "- [查看 Commits](https://github.com/${{ github.repository }}/commits)" >> $GITHUB_STEP_SUMMARY
          echo "- [查看 Actions](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})" >> $GITHUB_STEP_SUMMARY
          echo "- [博客首页](https://zzw868.github.io)" >> $GITHUB_STEP_SUMMARY
