<!-- 
========================================
加密货币实时价格组件 - 使用 Binance WebSocket
技术栈：React 18 + Recharts + useBinanceWS Hook
用途：展示多个加密货币的实时价格和走势
========================================
-->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>加密货币实时价格</title>
    <script src="https://unpkg.com/prop-types/prop-types.min.js"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Recharts - 使用双 CDN 备份 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/recharts/2.15.0/Recharts.min.js"></script>
    <script>
        // 如果 cdnjs 加载失败，尝试 unpkg 作为备用
        if (typeof Recharts === 'undefined') {
            console.warn('⚠️ cdnjs Recharts 加载失败，尝试备用 CDN...');
            const script = document.createElement('script');
            script.src = 'https://unpkg.com/recharts/umd/Recharts.min.js';
            document.head.appendChild(script);
        }
    </script>
    
    <!-- 引入 useBinanceWS Hook -->
    <script type="text/babel" data-type="module">
        import { useState, useEffect, useRef } from 'https://cdn.skypack.dev/react';
        
        // 在这里内联 useBinanceWS Hook（因为 CDN 导入限制）
        const useBinanceWS = (symbols = ['btcusdt']) => {
            const [data, setData] = useState({});
            const ws = useRef(null);
            const reconnectAttempts = useRef(0);
            const maxReconnectAttempts = 5;
            const reconnectTimeout = useRef(null);

            React.useEffect(() => {
                let isMounted = true;
                
                const connectWebSocket = () => {
                    try {
                        const streams = symbols.map(s => `${s.toLowerCase()}@ticker`).join('/');
                        const wsUrl = `wss://stream.binance.com:9443/ws/${streams}`;
                        
                        console.log(`🔌 正在连接 Binance WebSocket: ${wsUrl}`);
                        ws.current = new WebSocket(wsUrl);

                        ws.current.onopen = () => {
                            console.log('✅ Binance WebSocket 已连接');
                            reconnectAttempts.current = 0;
                        };

                        ws.current.onmessage = (event) => {
                            try {
                                const message = JSON.parse(event.data);
                                const { stream, data: rawData } = message;
                                const symbol = stream.split('@')[0].toUpperCase();
                                
                                if (isMounted) {
                                    setData(prev => ({
                                        ...prev,
                                        [symbol]: {
                                            price: parseFloat(rawData.c).toFixed(2),
                                            change: parseFloat(rawData.P).toFixed(2),
                                            high: parseFloat(rawData.h).toFixed(2),
                                            low: parseFloat(rawData.l).toFixed(2),
                                            volume: parseFloat(rawData.v).toFixed(2),
                                            timestamp: rawData.T
                                        }
                                    }));
                                }
                            } catch (error) {
                                console.error('❌ 解析 Binance 数据失败:', error);
                            }
                        };

                        ws.current.onerror = (error) => {
                            console.error('❌ Binance WebSocket 错误:', error);
                        };

                        ws.current.onclose = () => {
                            console.warn('⚠️ Binance WebSocket 断开连接');
                            
                            if (isMounted && reconnectAttempts.current < maxReconnectAttempts) {
                                reconnectAttempts.current += 1;
                                const delay = Math.min(1000 * Math.pow(2, reconnectAttempts.current), 10000);
                                
                                console.log(`🔄 ${delay/1000}秒后尝试第${reconnectAttempts.current}次重连...`);
                                
                                reconnectTimeout.current = setTimeout(() => {
                                    connectWebSocket();
                                }, delay);
                            }
                        };

                    } catch (error) {
                        console.error('❌ 创建 Binance WebSocket 失败:', error);
                    }
                };

                connectWebSocket();

                return () => {
                    isMounted = false;
                    
                    if (reconnectTimeout.current) {
                        clearTimeout(reconnectTimeout.current);
                    }
                    
                    if (ws.current) {
                        ws.current.close();
                    }
                };
            }, [symbols.join(',')]);

            return data;
        };
    </script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 32px;
            margin-bottom: 10px;
        }

        .crypto-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .crypto-card {
            background: white;
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.2);
            transition: transform 0.3s;
        }

        .crypto-card:hover {
            transform: translateY(-5px);
        }

        .crypto-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .crypto-symbol {
            font-size: 24px;
            font-weight: 700;
            color: #2d3748;
        }

        .crypto-price {
            font-size: 28px;
            font-weight: 700;
            color: #3182ce;
        }

        .crypto-change {
            padding: 6px 12px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 14px;
        }

        .positive {
            background: #c6f6d5;
            color: #22543d;
        }

        .negative {
            background: #fed7d7;
            color: #742a2a;
        }

        .crypto-stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #e2e8f0;
        }

        .stat-item {
            text-align: center;
        }

        .stat-label {
            font-size: 12px;
            color: #718096;
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 16px;
            font-weight: 600;
            color: #4a5568;
        }

        .loading {
            text-align: center;
            color: white;
            font-size: 18px;
            padding: 40px;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: rgba(255,255,255,0.2);
            border-radius: 20px;
            color: white;
            font-size: 14px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #52c41a;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // 安全检查：确保 Recharts 已加载
        if (typeof Recharts === 'undefined') {
            console.error('❌ Recharts 未加载！请检查网络或 CDN');
        }
        
        const { useState, useEffect } = React;
        const { LineChart, Line, XAxis, YAxis, Tooltip, ResponsiveContainer } = Recharts || {};

        // 主组件
        const CryptoPriceDashboard = () => {
            // 监控的币种列表
            const symbols = ['BTCUSDT', 'ETHUSDT', 'BNBUSDT', 'SOLUSDT', 'XRPUSDT'];
            const [historicalData, setHistoricalData] = useState([]);
            
            // 使用 useBinanceWS Hook（这里使用内联版本）
            const [cryptoData, setCryptoData] = useState({});
            const ws = React.useRef(null);
            const [connectionStatus, setConnectionStatus] = useState('connecting');

            React.useEffect(() => {
                let isMounted = true;
                let reconnectAttempts = 0;
                const maxReconnectAttempts = 5;
                let reconnectTimeout = null;

                const connectWebSocket = () => {
                    const streams = symbols.map(s => `${s.toLowerCase()}@ticker`).join('/');
                    const wsUrl = `wss://stream.binance.com:9443/ws/${streams}`;
                    
                    console.log(`🔌 正在连接 Binance WebSocket: ${wsUrl}`);
                    ws.current = new WebSocket(wsUrl);

                    ws.current.onopen = () => {
                        console.log('✅ Binance WebSocket 已连接');
                        if (isMounted) setConnectionStatus('connected');
                        reconnectAttempts = 0;
                    };

                    ws.current.onmessage = (event) => {
                        try {
                            const message = JSON.parse(event.data);
                            const { stream, data: rawData } = message;
                            const symbol = stream.split('@')[0].toUpperCase();
                            
                            if (isMounted) {
                                setCryptoData(prev => ({
                                    ...prev,
                                    [symbol]: {
                                        price: parseFloat(rawData.c).toFixed(2),
                                        change: parseFloat(rawData.P).toFixed(2),
                                        high: parseFloat(rawData.h).toFixed(2),
                                        low: parseFloat(rawData.l).toFixed(2),
                                        volume: parseFloat(rawData.v).toFixed(2)
                                    }
                                }));

                                // 添加到历史数据用于图表
                                setHistoricalData(prev => {
                                    const newData = [...prev, {
                                        time: new Date().toLocaleTimeString(),
                                        price: parseFloat(rawData.c)
                                    }];
                                    return newData.slice(-20); // 保留最近 20 条数据
                                });
                            }
                        } catch (error) {
                            console.error('❌ 解析数据失败:', error);
                        }
                    };

                    ws.current.onerror = (error) => {
                        console.error('❌ WebSocket 错误:', error);
                        if (isMounted) setConnectionStatus('error');
                    };

                    ws.current.onclose = () => {
                        console.warn('⚠️ WebSocket 断开');
                        
                        if (isMounted && reconnectAttempts < maxReconnectAttempts) {
                            reconnectAttempts++;
                            const delay = Math.min(1000 * Math.pow(2, reconnectAttempts), 10000);
                            
                            console.log(`🔄 ${delay/1000}秒后重连...`);
                            reconnectTimeout = setTimeout(connectWebSocket, delay);
                        }
                    };
                };

                connectWebSocket();

                return () => {
                    isMounted = false;
                    if (reconnectTimeout) clearTimeout(reconnectTimeout);
                    if (ws.current) ws.current.close();
                };
            }, []);

            // 格式化价格
            const formatPrice = (price) => {
                return new Intl.NumberFormat('en-US', {
                    style: 'currency',
                    currency: 'USD',
                    minimumFractionDigits: 2
                }).format(price);
            };

            // 获取涨跌颜色
            const getChangeColor = (change) => {
                return parseFloat(change) >= 0 ? '#52c41a' : '#ff4d4f';
            };

            if (Object.keys(cryptoData).length === 0) {
                return (
                    <div className="loading">
                        <div className="status-badge">
                            <span className="status-dot"></span>
                            <span>正在连接 Binance 实时数据...</span>
                        </div>
                    </div>
                );
            }

            return (
                <div className="container">
                    <div className="header">
                        <h1>🪙 加密货币实时价格</h1>
                        <div className="status-badge">
                            <span className="status-dot"></span>
                            <span>Binance 实时数据 • {connectionStatus === 'connected' ? '已连接' : '连接中...'}</span>
                        </div>
                    </div>

                    {/* 价格卡片网格 */}
                    <div className="crypto-grid">
                        {Object.entries(cryptoData).map(([symbol, info]) => (
                            <div key={symbol} className="crypto-card">
                                <div className="crypto-header">
                                    <span className="crypto-symbol">{symbol.replace('USDT', '')}</span>
                                    <span 
                                        className="crypto-change"
                                        style={{
                                            background: parseFloat(info.change) >= 0 ? '#c6f6d5' : '#fed7d7',
                                            color: parseFloat(info.change) >= 0 ? '#22543d' : '#742a2a'
                                        }}
                                    >
                                        {parseFloat(info.change) >= 0 ? '+' : ''}{info.change}%
                                    </span>
                                </div>
                                
                                <div className="crypto-price">
                                    {formatPrice(info.price)}
                                </div>

                                <div className="crypto-stats">
                                    <div className="stat-item">
                                        <div className="stat-label">24h 最高</div>
                                        <div className="stat-value">{formatPrice(info.high)}</div>
                                    </div>
                                    <div className="stat-item">
                                        <div className="stat-label">24h 最低</div>
                                        <div className="stat-value">{formatPrice(info.low)}</div>
                                    </div>
                                    <div className="stat-item">
                                        <div className="stat-label">24h 成交量</div>
                                        <div className="stat-value">{info.volume}</div>
                                    </div>
                                </div>
                            </div>
                        ))}
                    </div>

                    {/* BTC 价格走势图 */}
                    {cryptoData.BTCUSDT && (
                        <div style={{
                            background: 'white',
                            borderRadius: '16px',
                            padding: '20px',
                            boxShadow: '0 8px 16px rgba(0,0,0,0.2)'
                        }}>
                            <h2 style={{ marginBottom: '20px', color: '#2d3748' }}>
                                📈 BTC 实时价格走势
                            </h2>
                            <ResponsiveContainer width="100%" height={300}>
                                <LineChart data={historicalData}>
                                    <XAxis dataKey="time" tick={{ fontSize: 12 }} />
                                    <YAxis domain={['auto', 'auto']} tickFormatter={(v) => `$${v}`} />
                                    <Tooltip />
                                    <Line 
                                        type="monotone" 
                                        dataKey="price" 
                                        stroke="#f7931a" 
                                        strokeWidth={2}
                                        dot={false}
                                    />
                                </LineChart>
                            </ResponsiveContainer>
                        </div>
                    )}
                </div>
            );
        };

        // 渲染组件
        ReactDOM.createRoot(document.getElementById('root')).render(
            <CryptoPriceDashboard />
        );
    </script>
</body>
</html>
