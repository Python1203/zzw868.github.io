scheme: Muse
darkmode: true
menu:
  home: / || fa fa-home
  about: /about/ || fa fa-user
  cases: /cases/ || fa fa-briefcase
  archives: /archives/ || fa fa-archive
  tags: /tags/ || fa fa-tags
  categories: /categories/ || fa fa-th
menu_settings:
  icons: true
  badges: true
sidebar:
  position: left
  display: always
  onmobile: true
  padding: 18
  offset: 12
avatar:
  url: /images/avatar.jpg
  rounded: true
  rotated: false
social:
  GitHub: https://github.com/zzw868 || fab fa-github
  RSS: /atom.xml || fa fa-rss
social_icons:
  enable: true
  icons_only: false
  transition: true
links_settings:
  icon: fa fa-link
  title: 金融工具
  layout: block
links:
  TradingView: https://www.tradingview.com
  AkShare文档: https://akshare.akfamily.xyz
  DeepSeek: https://platform.deepseek.com
post_meta:
  updated_at:
    enable: true
    another_day: true
read_more_btn: true
symbols_count_time:
  separated_meta: true
  item_text_post: true
  item_text_total: false
codeblock:
  theme:
    light: default
    dark: stackoverflow-dark
  copy_button:
    enable: true
    style: default
back2top:
  enable: true
  sidebar: false
  scrollpercent: true
reading_progress:
  enable: true
  start_at: left
  color: '#6366f1'
  height: 3px
footer:
  since: 2020
  icon:
    name: fa fa-heart
    animated: true
    color: '#ff0000'
  copyright: zzw868
  powered: false
canonical: true
seo: true
index_with_subtitle: true
local_search:
  enable: true
  trigger: auto
  top_n_per_article: 3
  unescape: false
  preload: false
live2d:
  enable: true
  scriptFrom: local
  pluginRootPath: live2dw/
  pluginJsPath: lib/
  pluginModelPath: assets/
  tagMode: false
  log: false
  model:
    use: live2d-widget-model-hibiki
  display:
    position: right
    width: 150
    height: 200
    hOffset: 0
    vOffset: -20
  mobile:
    show: false
  react:
    opacityDefault: 0.85
    opacityOnHover: 1.0
custom_file_path:
  sidebar: source/_data/sidebar.njk
  bodyEnd: source/_data/body-end.njk
  style: source/_data/custom.styl
motion:
  enable: true
  async: false
  transition:
    post_block: fadeIn
    post_header: fadeInDown
    post_body: fadeInDown
    coll_header: fadeInLeft
    sidebar: fadeInDown
note:
  style: flat
  icons: true
  border_radius: 3
  light_bg_offset: 0
vendors:
  _internal: static
cache:
  enable: true
minify: false
