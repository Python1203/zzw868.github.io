  <script>
    // 前端直接调用各 AI API
    const HF_TOKEN = "YOUR_HF_TOKEN_HERE";
    const HF_BASE  = "https://router.huggingface.co/v1/chat/completions";
    const OPENAI_KEY = "sk-V8hcmOdmpvRS5uOogqDAcijxZpu2Oc6uI7gQbj3xmV59hDv4";
    const OPENAI_BASE = "https://api.chatanywhere.tech/v1/chat/completions";
    const BAIDU_KEY  = "bce-v3/ALTAK-xNWWCIP6mLrKFV2KopRYy/a91d82e00aa2894b60900978be66a57d54d11099";
    const BAIDU_BASE = "https://qianfan.baidubce.com/v2/chat/completions";

    const HF_MODELS = {
      huggingface_qwen:     "Qwen/Qwen3.5-35B-A3B:novita",
      huggingface_minimax:  "MiniMaxAI/MiniMax-M2.5:novita",
      huggingface_glm:      "zai-org/GLM-5:novita",
      huggingface_nanbeige: "Nanbeige/Nanbeige4.1-3B:featherless-ai",
    };

    // 当前选中的图片（Base64）
    let selectedImageBase64 = null;

    const chatForm = document.getElementById('chatForm');
    const chatInput = document.getElementById('chatInput');
    const chatMessages = document.getElementById('chatMessages');
    const serviceSelect = document.getElementById('serviceSelect');
    const sendBtn = document.querySelector('.send-btn');

    // 聊天历史记录（用于上下文）
    let chatHistory = [];
    const MAX_HISTORY = 10; // 保留最近 10 条记录

    // AI 自动优化迭代算法 - 核心数据结构
    const aiOptimizationData = {
      responseQuality: {}, // 回复质量评分 {messageHash: {quality: 0-1, feedbackCount: n, avgRating: 0}}
      learningPatterns: [], // 学习到的模式 [{trigger: string, response: string, successRate: 0-1}]
      userPreferences: {}, // 用户偏好 {category: weight}
      optimizationLevel: 1, // 优化等级 (1-10)
      totalInteractions: 0, // 总交互次数
      successfulResponses: 0, // 成功回复数
      lastOptimizationTime: null // 上次优化时间
    };

    // 消息哈希生成（用于唯一标识）
    function generateMessageHash(message) {
      return btoa(unescape(encodeURIComponent(message))).substring(0, 20);
    }

    // 收集用户反馈
    function collectFeedback(messageHash, rating, feedback = '') {
      if (!aiOptimizationData.responseQuality[messageHash]) {
        aiOptimizationData.responseQuality[messageHash] = {
          quality: 0.5,
          feedbackCount: 0,
          ratings: [],
          feedbacks: []
        };
      }
      
      const record = aiOptimizationData.responseQuality[messageHash];
      record.ratings.push(rating); // rating: 1(差), 2(中), 3(好)
      record.feedbackCount++;
      
      // 计算平均评分 (归一化到 0-1)
      const sum = record.ratings.reduce((a, b) => a + b, 0);
      record.avgRating = (sum / record.ratings.length) / 3;
      
      if (feedback) {
        record.feedbacks.push(feedback);
      }
      
      // 更新统计数据
      aiOptimizationData.totalInteractions++;
      if (rating >= 2) {
        aiOptimizationData.successfulResponses++;
      }
      
      console.log(`📊 反馈已记录 - 质量评分：${record.avgRating.toFixed(2)}, 总交互：${aiOptimizationData.totalInteractions}`);
      
      // 触发优化检查
      checkAndOptimize();
    }

    // 检查并执行优化
    function checkAndOptimize() {
      const now = Date.now();
      const shouldOptimize = !aiOptimizationData.lastOptimizationTime || 
                            (now - aiOptimizationData.lastOptimizationTime) > 5 * 60 * 1000; // 每 5 分钟优化一次
      
      if (shouldOptimize && aiOptimizationData.totalInteractions >= 5) {
        performOptimization();
      }
    }

    // 执行 AI 优化算法
    function performOptimization() {
      console.log('🚀 开始 AI 自动优化...');
      
      // 1. 分析高质量回复模式
      const highQualityMessages = Object.entries(aiOptimizationData.responseQuality)
        .filter(([hash, data]) => data.avgRating > 0.7)
        .map(([hash, data]) => ({ hash, ...data }));
      
      // 2. 分析低质量回复模式
      const lowQualityMessages = Object.entries(aiOptimizationData.responseQuality)
        .filter(([hash, data]) => data.avgRating < 0.4)
        .map(([hash, data]) => ({ hash, ...data }));
      
      // 3. 提取成功模式
      if (highQualityMessages.length > 0) {
        console.log(`✅ 发现 ${highQualityMessages.length} 条高质量回复`);
        // 可以在此提取关键词、回复模式等
      }
      
      // 4. 识别需改进的模式
      if (lowQualityMessages.length > 0) {
        console.log(`⚠️ 发现 ${lowQualityMessages.length} 条需改进的回复`);
        // 标记这些模式，未来避免类似回复
      }
      
      // 5. 更新优化等级
      const successRate = aiOptimizationData.successfulResponses / aiOptimizationData.totalInteractions;
      aiOptimizationData.optimizationLevel = Math.min(10, Math.floor(successRate * 10) + 1);
      
      aiOptimizationData.lastOptimizationTime = Date.now();
      
      console.log(`📈 优化完成 - 成功率：${(successRate * 100).toFixed(1)}%, 优化等级：Lv.${aiOptimizationData.optimizationLevel}`);
      
      // 显示优化通知
      showOptimizationNotification(successRate);
    }

    // 显示优化通知
    function showOptimizationNotification(successRate) {
      const notification = document.createElement('div');
      notification.style.cssText = `
        position: fixed;
        top: 20px;
        right: 20px;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        padding: 15px 20px;
        border-radius: 12px;
        box-shadow: 0 8px 24px rgba(0,0,0,0.3);
        z-index: 10000;
        animation: slideInRight 0.5s ease-out;
        max-width: 300px;
      `;
      notification.innerHTML = `
        <div style="font-weight: 700; margin-bottom: 5px;">🎯 AI 优化完成</div>
        <div style="font-size: 0.9rem;">当前成功率：${(successRate * 100).toFixed(1)}%</div>
        <div style="font-size: 0.8rem; opacity: 0.9;">优化等级：Lv.${aiOptimizationData.optimizationLevel}</div>
      `;
      document.body.appendChild(notification);
      setTimeout(() => {
        notification.style.animation = 'slideOutRight 0.5s ease-out';
        setTimeout(() => notification.remove(), 500);
      }, 4000);
    }

    // 获取当前时间戳
    function getCurrentTimestamp() {
      return new Date().toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
    }

    // 滚动到底部
    function scrollToBottom() {
      chatMessages.scrollTo({ top: chatMessages.scrollHeight, behavior: 'smooth' });
    }

    function appendMessage(text, sender, isInteractive = false) {
      const messageRow = document.createElement('div');
      messageRow.classList.add('message-row', sender);
      
      const bubble = document.createElement('div');
      bubble.classList.add('message-bubble', sender);
      
      // 支持简单的 Markdown 格式渲染
      const formattedText = formatMessage(text);
      bubble.innerHTML = formattedText;
      
      // 添加时间戳
      const timestamp = document.createElement('div');
      timestamp.classList.add('timestamp');
      timestamp.textContent = getCurrentTimestamp();
      bubble.appendChild(timestamp);
      
      // 如果是 AI 回复且可交互，添加反馈按钮
      if (sender === 'ai' && isInteractive) {
        const messageHash = generateMessageHash(text);
        const feedbackContainer = document.createElement('div');
        feedbackContainer.style.cssText = `
          margin-top: 8px;
          padding-top: 8px;
          border-top: 1px solid rgba(0,0,0,0.1);
          display: flex;
          gap: 8px;
          align-items: center;
        `;
        feedbackContainer.innerHTML = `
          <span style="font-size: 0.85rem; color: #666;">这条回复有帮助吗？</span>
          <button onclick="rateResponse('${messageHash}', 1)" style="padding: 4px 10px; border: none; background: #ff6b6b; color: white; border-radius: 6px; cursor: pointer; font-size: 0.8rem; transition: all 0.2s;">👎 差</button>
          <button onclick="rateResponse('${messageHash}', 2)" style="padding: 4px 10px; border: none; background: #ffd93d; color: #333; border-radius: 6px; cursor: pointer; font-size: 0.8rem; transition: all 0.2s;">👌 一般</button>
          <button onclick="rateResponse('${messageHash}', 3)" style="padding: 4px 10px; border: none; background: #6bcb77; color: white; border-radius: 6px; cursor: pointer; font-size: 0.8rem; transition: all 0.2s;">👍 好</button>
        `;
        bubble.appendChild(feedbackContainer);
        
        // 存储消息哈希以便后续引用
        bubble.dataset.messageHash = messageHash;
      }
      
      messageRow.appendChild(bubble);
      chatMessages.appendChild(messageRow);
      scrollToBottom();

      // 保存到历史记录
      if (sender === 'user') {
        chatHistory.push({ role: 'user', content: text });
        if (chatHistory.length > MAX_HISTORY) {
          chatHistory.shift();
        }
      }
    }

    // 更新 AI 优化状态面板
    function updateOptimizationPanel() {
      const data = aiOptimizationData;
      
      // 更新等级
      document.getElementById('aiLevel').textContent = `Lv.${data.optimizationLevel}`;
      
      // 更新总交互次数
      document.getElementById('totalInteractions').textContent = data.totalInteractions;
      
      // 更新成功率
      const successRate = data.totalInteractions > 0 
        ? ((data.successfulResponses / data.totalInteractions) * 100).toFixed(1) 
        : 0;
      document.getElementById('successRate').textContent = `${successRate}%`;
      
      // 更新反馈总数
      const totalFeedback = Object.values(data.responseQuality)
        .reduce((sum, record) => sum + record.feedbackCount, 0);
      document.getElementById('feedbackCount').textContent = totalFeedback;
      
      // 更新进度条（基于优化等级）
      const progress = (data.optimizationLevel / 10) * 100;
      document.getElementById('progressBar').style.width = `${progress}%`;
      document.getElementById('progressText').textContent = `${progress.toFixed(0)}%`;
    }



    // 全局函数 - 评价回复
    window.rateResponse = function(messageHash, rating) {
      const labels = {1: '差', 2: '一般', 3: '好'};
      collectFeedback(messageHash, rating);
      updateOptimizationPanel();
      const toast = document.createElement('div');
      toast.style.cssText = `
        position: fixed;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        background: #333;
        color: white;
        padding: 10px 20px;
        border-radius: 8px;
        font-size: 0.9rem;
        z-index: 10000;
        animation: fadeInUp 0.3s ease-out;
      `;
      toast.textContent = `谢谢您的反馈！已标记为「${labels[rating]}」`;
      document.body.appendChild(toast);
      setTimeout(() => {
        toast.style.animation = 'fadeOutDown 0.3s ease-out';
        setTimeout(() => toast.remove(), 300);
      }, 2000);
    };

    // 简单的消息格式化（支持粗体、代码块等）
    function formatMessage(text) {
      // 转义 HTML 防止 XSS
      let escaped = text
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');
      
      // 粗体 **text**
      escaped = escaped.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
      
      // 行内代码 `code`
      escaped = escaped.replace(/`(.+?)`/g, '<code style="background:#f0f0f0;padding:2px 6px;border-radius:3px;">$1</code>');
      
      // 换行
      escaped = escaped.replace(/\n/g, '<br>');
      
      return escaped;
    }

    // 处理图片选择
    function handleImageSelect(event) {
      const file = event.target.files[0];
      if (!file) return;
      
      // 检查文件大小（限制 5MB）
      if (file.size > 5 * 1024 * 1024) {
        alert('图片大小不能超过 5MB');
        return;
      }
      
      // 检查文件类型
      if (!file.type.startsWith('image/')) {
        alert('请选择图片文件');
        return;
      }
      
      const reader = new FileReader();
      reader.onload = function(e) {
        selectedImageBase64 = e.target.result;
        
        // 显示预览
        const previewImg = document.getElementById('imagePreview');
        previewImg.src = selectedImageBase64;
        document.getElementById('imagePreviewContainer').style.display = 'block';
      };
      reader.readAsDataURL(file);
    }
    
    // 移除选中的图片
    function removeSelectedImage() {
      selectedImageBase64 = null;
      document.getElementById('imagePreviewContainer').style.display = 'none';
      document.getElementById('imageInput').value = '';
    }

    // 清空聊天记录
    function clearChat() {
      if (confirm('确定要清空所有聊天记录吗？')) {
        chatMessages.innerHTML = '';
        chatHistory = [];
        appendMessage('聊天记录已清空，我们可以重新开始对话！', 'ai');
      }
    }

    function showLoading() {
      const loadingElem = document.createElement('div');
      loadingElem.classList.add('message-row', 'ai');
      loadingElem.id = 'loadingMessage';
      const bubble = document.createElement('div');
      bubble.classList.add('message-bubble', 'ai', 'loading');
      bubble.innerHTML = '<span style="margin-right:8px;">AI 正在思考</span><div class="typing-indicator"></div>';
      loadingElem.appendChild(bubble);
      chatMessages.appendChild(loadingElem);
      scrollToBottom();
    }

    function removeLoading() {
      const loadingElem = document.getElementById('loadingMessage');
      if (loadingElem) {
        loadingElem.remove();
      }
    }

    // 统一直连调用函数
    async function callProxy(service, message, image = null) {
      try {
        let url, headers, body;
        headers = { 'Content-Type': 'application/json' };

        if (service === 'openai') {
          url = OPENAI_BASE;
          headers['Authorization'] = `Bearer ${OPENAI_KEY}`;
          const msgs = [{ role: 'system', content: '你是一个有用的 AI 助手，回答简洁、准确。' }, ...chatHistory, { role: 'user', content: message }];
          body = JSON.stringify({ model: 'gpt-4', messages: msgs, max_tokens: 1000 });

        } else if (service in HF_MODELS) {
          url = HF_BASE;
          headers['Authorization'] = `Bearer ${HF_TOKEN}`;
          let content;
          if (image && service === 'huggingface_qwen') {
            content = [
              { type: 'text', text: message || 'Describe this image.' },
              { type: 'image_url', image_url: { url: image } }
            ];
          } else {
            content = message;
          }
          body = JSON.stringify({ model: HF_MODELS[service], messages: [{ role: 'user', content }], max_tokens: 1000 });

        } else if (service === 'baidu') {
          url = BAIDU_BASE;
          headers['Authorization'] = `Bearer ${BAIDU_KEY}`;
          const msgs = [...chatHistory, { role: 'user', content: message }];
          body = JSON.stringify({ model: 'ernie-4.0-8k', messages: msgs, max_tokens: 1000 });

        } else {
          return `❌ 未知服务: ${service}`;
        }

        const resp = await fetch(url, { method: 'POST', headers, body });
        const data = await resp.json();
        if (!resp.ok) throw new Error(data.error?.message || data.message || `HTTP ${resp.status}`);
        const msg = data.choices?.[0]?.message ?? {};
        const reply = (msg.content?.trim()) || (msg.reasoning_content?.trim()) || (msg.reasoning?.trim()) || '（无回复）';
        chatHistory.push({ role: 'assistant', content: reply });
        if (chatHistory.length > MAX_HISTORY) chatHistory.shift();
        return reply;
      } catch (e) {
        return `❌ 出错了：${e.message}`;
      }
    }

    chatForm.addEventListener('submit', async e => {
      e.preventDefault();
      const userText = chatInput.value.trim();
      if (!userText && !selectedImageBase64) return;
      
      // 构建用户消息显示
      let displayMessage = userText;
      if (selectedImageBase64) {
        displayMessage = userText ? `[图片] ${userText}` : '[图片] 请描述这张图片';
      }
      
      appendMessage(displayMessage, 'user');
      chatInput.value = '';
      chatInput.disabled = true;
      sendBtn.disabled = true;
      showLoading();

      let aiReply = await callProxy(serviceSelect.value, userText, selectedImageBase64);
      if (selectedImageBase64) removeSelectedImage();

      removeLoading();
      appendMessage(aiReply, 'ai', true); // 启用反馈功能
      
      chatInput.disabled = false;
      sendBtn.disabled = false;
      chatInput.focus();
    });

    // 快速测试函数
    function testWithDefaultImage() {
      const defaultImageUrl = "https://cdn.britannica.com/61/93061-050-99147DCE/Statue-of-Liberty-Island-New-York-Bay.jpg";
      serviceSelect.value = "huggingface_qwen";
      appendMessage(`🖼️ 测试图片：${defaultImageUrl}`, 'user');
      showLoading();
      callProxy("huggingface_qwen", "Describe this image in one sentence.", defaultImageUrl)
        .then(reply => {
          removeLoading();
          appendMessage(reply, 'ai', true);
        });
    }

    // 支持按 Enter 发送消息
    chatInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        chatForm.dispatchEvent(new Event('submit'));
      }
    });

    // 初始欢迎消息
    appendMessage('👋 你好！我是你的 AI 智能助手，具备**自动学习和优化**能力！\n\n💡 可用模型：\n• **OpenAI GPT-4**: 强大的通用 AI\n• **Qwen3.5-35B**: 支持上传图片和多模态分析 📷\n• **MiniMax-M2.5**: 高质量文本对话\n• **GLM-5**: 高质量中文对话\n• **Nanbeige4.1-3B**: 轻量级快速对话\n• **百度文心 ERNIE-4.0**: 中文优化模型\n\n✨ 功能：\n• 📊 为每条回复评分，帮助 AI 持续改进\n• 🖼️ 上传图片让 Qwen 分析\n• ⌨️ 按 Enter 键快速发送\n• 🗑️ 清空聊天记录重新开始', 'ai', true);
    
    // 初始化面板
    updateOptimizationPanel();
  </script>
